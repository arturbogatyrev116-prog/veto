[graph]
all-features = false

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "Zlib",
    "OpenSSL",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "deny"
deny = [
    { name = "openssl", version = "<0.10.55" },
]

[advisories]
yanked = "deny"
unmaintained = "workspace"
ignore = [
    # rustls-webpki 0.102.x CVEs — pulled in by async-nats 0.37.
    # Our NATS connection uses nats:// (no TLS), so CRL parsing is never reached.
    # TODO: update async-nats to 0.49+ to get rustls-webpki 0.103.x.
    "RUSTSEC-2026-0104",
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0049",

    # GTK3 bindings marked unmaintained — transitive Tauri dependencies.
    # Tauri has migrated to GTK4; these still function correctly on supported platforms.
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    "RUSTSEC-2024-0429",

    # Other unmaintained Tauri transitive deps.
    "RUSTSEC-2023-0089",  # atomic-polyfill
    "RUSTSEC-2024-0370",  # proc-macro-error
    "RUSTSEC-2025-0134",  # rustls-pemfile
    "RUSTSEC-2025-0075",  # unic-char-range
    "RUSTSEC-2025-0080",  # unic-common
    "RUSTSEC-2025-0081",  # unic-char-property
    "RUSTSEC-2025-0098",  # unic-ucd-version
    "RUSTSEC-2025-0100",  # unic-ucd-ident
]
