name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ── Server Docker image ───────────────────────────────────────────────────────
  server:
    name: Server (Docker)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: messenger-server/Dockerfile
          push: false
          tags: messenger-server:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Desktop: Windows ─────────────────────────────────────────────────────────
  desktop-windows:
    name: Desktop (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: messenger-app/package-lock.json

      - name: Install frontend deps
        working-directory: messenger-app
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: messenger-app
          tagName: ${{ github.ref_name }}
          releaseName: Veto ${{ github.ref_name }}
          releaseBody: "See DEPLOY.md for deployment instructions."
          releaseDraft: true
          args: "--bundles msi,nsis"

  # ── Desktop: Linux ───────────────────────────────────────────────────────────
  desktop-linux:
    name: Desktop (Linux)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: messenger-app/package-lock.json

      - name: Install frontend deps
        working-directory: messenger-app
        run: npm ci

      - name: Build Tauri app (deb + AppImage)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: messenger-app
          tagName: ${{ github.ref_name }}
          releaseName: Veto ${{ github.ref_name }}
          releaseBody: "See DEPLOY.md for deployment instructions."
          releaseDraft: true
          args: "--bundles deb,appimage"

  # ── Desktop: macOS ───────────────────────────────────────────────────────────
  desktop-macos:
    name: Desktop (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: messenger-app/package-lock.json

      - name: Install frontend deps
        working-directory: messenger-app
        run: npm ci

      - name: Build Tauri app (universal DMG)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: messenger-app
          tagName: ${{ github.ref_name }}
          releaseName: Veto ${{ github.ref_name }}
          releaseBody: "See DEPLOY.md for deployment instructions."
          releaseDraft: true
          args: "--bundles dmg --target universal-apple-darwin"
